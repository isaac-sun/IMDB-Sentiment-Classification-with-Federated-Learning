# Configuration for IMDB Federated Learning Project

# Data Configuration
data:
  name: "imdb"
  max_vocab_size: 20000
  max_seq_length: 256
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  batch_size: 32

# Model Configuration
model:
  embedding_dim: 128
  hidden_dim: 256
  num_layers: 2
  dropout: 0.5
  bidirectional: True

# Training Configuration - Centralized
centralized:
  epochs: 10
  learning_rate: 0.001
  weight_decay: 1e-5
  early_stopping_patience: 3

# Federated Learning Configuration
federated:
  num_clients: 5
  local_epochs: 2
  global_rounds: 10
  learning_rate: 0.001
  weight_decay: 1e-5
  alpha: 0.5  # Dirichlet distribution parameter for non-IID data

# Evaluation Configuration
evaluation:
  batch_size: 64

# Output Configuration
output:
  models_dir: "outputs/models"
  plots_dir: "outputs/plots"
  logs_dir: "outputs/logs"

# Random Seed
seed: 42
